<html>
<head>
<title>Tankstations Kaart</title>
<style>
    html, body { margin:0; padding:0; height:100%; }
    #map { height: 100%; width: 100%; }
</style>
<script src="https://maps.googleapis.com/maps/api/js?key='$googleMapsApiKey'&callback=initMap" async defer></script>
<script>
function initMap() {
    const center = { lat: '$lat', lng: '$lng' };

    const map = new google.maps.Map(document.getElementById('map'), {
        zoom: 10,
        center: center
    });

    const stations = JSON.parse('$stationsJsonEscaped');

    // --- goedkoopste prijs bepalen ---
    const cheapest = Math.min(...stations.map(s => parseFloat(s.e10)));

    // --- kleur bepalen ---
    function getColor(price, cheapest) {
        const p = parseFloat(price);
        const diff = (p - cheapest) / cheapest;

        if (diff <= 0.01) return "00CC00";   // groen
        if (diff <= 0.02) return "FFFF00";   // geel
        return "FF0000";                     // rood
    }

    stations.forEach(function(s) {

        const color = getColor(s.e10, cheapest);

        // Dynamisch icon met kleur + prijs (GEEN backticks!)
        const iconUrl =
            "https://chart.googleapis.com/chart?chst=d_bubble_text_small&chld=bb|" 
            + s.e10 + "|" + color + "|000000";

        const marker = new google.maps.Marker({
            position: { lat: s.lat, lng: s.lng },
            map: map,
            icon: {
                url: iconUrl,
                scaledSize: new google.maps.Size(55, 55),   // vaste grootte
                anchor: new google.maps.Point(27, 55)
            },
            title: s.name
        });

        const info = new google.maps.InfoWindow({
            content:
                "<b>" + s.name + "</b><br>" +
                s.address + "<br><br>" +
                "<b>E10:</b> " + s.e10 + "<br>" +
                "<b>E5:</b> " + s.e5 + "<br>" +
                "<b>Diesel:</b> " + s.diesel
        });

        marker.addListener("click", function() {
            info.open(map, marker);
        });
    });
}
</script>
</head>
<body>
<div id="map"></div>
</body>
</html>
